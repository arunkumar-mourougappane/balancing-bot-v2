name: CodeQL Analysis

# Push / PR  → only when source files change (paths filter).
#              Documentation, README, and workflow-only commits are skipped.
# Schedule   → weekly full scan regardless of what changed, so newly published
#              vulnerability patterns are applied even when the code is quiet.
#              (paths filters are ignored on schedule triggers by GitHub.)
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'lib/**'
      - 'include/**'
      - 'platformio.ini'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'lib/**'
      - 'include/**'
      - 'platformio.ini'
  schedule:
    - cron: '0 6 * * 1'    # Every Monday at 06:00 UTC

# Cancel an in-progress scan on the same branch/PR when a newer commit
# arrives.  Avoids queuing multiple CodeQL jobs for rapid-fire pushes.
# The schedule trigger gets its own group so it is never cancelled.
concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

jobs:
  analyze:
    name: Analyze (C/C++)
    runs-on: ubuntu-latest
    permissions:
      security-events: write  # upload SARIF results to the Security tab
      actions: read           # read workflow metadata
      contents: read          # checkout

    steps:
      # ── Source ───────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python ───────────────────────────────────────────────────────────────
      # Same 3.11 pin as build.yml: framework-mbed uses imp/distutils removed
      # in Python 3.12, and ubuntu-latest now ships 3.12+.
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── PlatformIO ───────────────────────────────────────────────────────────
      - name: Install PlatformIO Core
        run: pip install "platformio~=6.1"

      # ── Cache ────────────────────────────────────────────────────────────────
      # Two separate restore steps — one per toolchain family — using the same
      # key format as build.yml so that caches warmed by the build workflow are
      # reused here without a second download.
      #
      # Step 1: ARM GCC + framework-mbed (~400 MB) for the lpc1768 build.
      # Step 2: Xtensa GCC + Arduino ESP32 core (~500 MB) for esp32s3_tft.
      #
      # GitHub Actions allows multiple cache steps on the same path; each step
      # layers its packages on top of whatever is already in ~/.platformio.
      # Together they populate the full toolchain set in one cache-restore pass.
      - name: Restore PlatformIO cache (mbed / ARM)
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-lpc1768-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-lpc1768-
            pio-${{ runner.os }}-

      - name: Restore PlatformIO cache (Arduino / ESP32)
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-esp32s3_tft-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            pio-${{ runner.os }}-esp32s3_tft-
            pio-${{ runner.os }}-

      # ── CodeQL init ──────────────────────────────────────────────────────────
      # Must run before the build so CodeQL can trace every compiler invocation.
      #
      # language: c-cpp     — covers both C and C++ translation units
      # queries: security-and-quality — security suite + quality checks
      #   (dead code, integer overflow, unused return values, type confusion)
      # build-mode: manual  — PlatformIO is not detected by CodeQL autobuild
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: c-cpp
          queries: security-and-quality
          build-mode: manual

      # ── Build ────────────────────────────────────────────────────────────────
      # lpc1768 traces: lib/MPU9250, lib/AHRS, src/main.cpp, lib/HAL/hal_mbed.cpp
      # esp32s3_tft traces the only remaining unique file: lib/HAL/hal_arduino.cpp
      # frdm_k64f is intentionally skipped — it compiles the same hal_mbed.cpp
      # path as lpc1768 and adds no new translation units to the database.
      - name: Build lpc1768 (mbed HAL path)
        run: pio run -e lpc1768

      - name: Build esp32s3_tft (Arduino HAL path)
        run: pio run -e esp32s3_tft

      # ── Analysis ─────────────────────────────────────────────────────────────
      # Upload SARIF to GitHub Security → Code scanning alerts.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:c-cpp
